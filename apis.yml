name: Apigee
description: >-
  Apigee is Google Cloud's native API management platform for building,
  managing, and securing APIs across any use case, environment, or scale.
  It provides API proxies, security, rate limiting, quotas, analytics,
  monetization, and developer portal capabilities.
image: https://www.apigee.com/about/sites/default/files/apigee-logo.png
url: https://cloud.google.com/apigee
created: '2024-01-01'
modified: '2026-03-04'
