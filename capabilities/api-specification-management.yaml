naftiko: 1.0.0-alpha2
info:
  label: Apigee API Specification Management
  description: Unified workflow for managing API specifications on Apigee — browsing the API Hub catalog, retrieving spec
    contents, linting for compliance, and cross-referencing with Registry artifacts. Provides API product managers and governance
    teams a single surface to inspect, validate, and govern the specifications that define your API contracts.
  tags:
  - Apigee
  - API Specifications
  - API Governance
  - OpenAPI
  - Google Cloud
  created: '2026-04-20'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: api-hub
    baseUri: https://apihub.googleapis.com/v1
    description: Apigee API Hub REST API.
    authentication:
      type: bearer
      token: '{{GOOGLE_ACCESS_TOKEN}}'
    resources:
    - name: apis
      path: /projects/{projectId}/locations/{locationId}/apis
      operations:
      - name: listApis
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: apis
          type: array
          value: $.apis
    - name: api
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}
      operations:
      - name: getApi
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        outputParameters:
        - name: api
          type: object
          value: $.
    - name: api-versions
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions
      operations:
      - name: listApiVersions
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: versions
          type: array
          value: $.versions
    - name: api-specs
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs
      operations:
      - name: listApiSpecs
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: versionId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: specs
          type: array
          value: $.specs
    - name: api-spec-contents
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs/{specId}:getContents
      operations:
      - name: getApiSpecContents
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: versionId
          in: path
        - name: specId
          in: path
        outputParameters:
        - name: contents
          type: object
          value: $.
    - name: api-spec-lint
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs/{specId}:lint
      operations:
      - name: lintApiSpec
        method: POST
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: versionId
          in: path
        - name: specId
          in: path
        outputParameters:
        - name: operation
          type: object
          value: $.
    - name: deployments
      path: /projects/{projectId}/locations/{locationId}/deployments
      operations:
      - name: listDeployments
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: deployments
          type: array
          value: $.deployments
    - name: dependencies
      path: /projects/{projectId}/locations/{locationId}/dependencies
      operations:
      - name: listDependencies
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: dependencies
          type: array
          value: $.dependencies
    - name: search
      path: /projects/{projectId}/locations/{locationId}:searchResources
      operations:
      - name: searchResources
        method: POST
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        outputParameters:
        - name: searchResults
          type: array
          value: $.searchResults
  - type: http
    namespace: registry
    baseUri: https://apigeeregistry.googleapis.com/v1
    description: Apigee Registry REST API.
    authentication:
      type: bearer
      token: '{{GOOGLE_ACCESS_TOKEN}}'
    resources:
    - name: apis
      path: /projects/{projectId}/locations/{locationId}/apis
      operations:
      - name: listApis
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: apis
          type: array
          value: $.apis
    - name: api
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}
      operations:
      - name: getApi
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        outputParameters:
        - name: api
          type: object
          value: $.
    - name: api-versions
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions
      operations:
      - name: listApiVersions
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: apiVersions
          type: array
          value: $.apiVersions
    - name: api-specs
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs
      operations:
      - name: listApiSpecs
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: versionId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: apiSpecs
          type: array
          value: $.apiSpecs
    - name: api-spec-contents
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs/{specId}:getContents
      operations:
      - name: getApiSpecContents
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: apiId
          in: path
        - name: versionId
          in: path
        - name: specId
          in: path
        outputParameters:
        - name: contents
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: apigee-specs-api
    description: Unified REST API for Apigee API specification management.
    resources:
    - path: /v1/hub/apis
      name: hub-apis
      description: APIs catalogued in API Hub.
      operations:
      - method: GET
        name: list-hub-apis
        description: List all APIs in the API Hub catalog.
        call: api-hub.listApis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hub/specs
      name: hub-specs
      description: Specs for a given API version in Hub.
      operations:
      - method: GET
        name: list-hub-specs
        description: List specs for an API version.
        call: api-hub.listApiSpecs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/registry/apis
      name: registry-apis
      description: APIs tracked in the Apigee Registry.
      operations:
      - method: GET
        name: list-registry-apis
        description: List APIs in the Registry.
        call: registry.listApis
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: apigee-specs-mcp
    transport: http
    description: MCP server for AI-assisted API specification management and governance.
    tools:
    - name: list-hub-apis
      description: List all APIs catalogued in Apigee API Hub — the primary API inventory for governance.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-hub.listApis
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-versions
      description: List versions of a specific API in the Hub catalog.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-hub.listApiVersions
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-specs
      description: List OpenAPI and other specs attached to an API version in the Hub.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-hub.listApiSpecs
      outputParameters:
      - type: object
        mapping: $.
    - name: get-api-spec-contents
      description: Retrieve the raw contents of an API spec — useful for inspection, diffing, or feeding to an AI agent.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-hub.getApiSpecContents
      outputParameters:
      - type: object
        mapping: $.
    - name: lint-api-spec
      description: Lint an API spec for compliance and quality violations — returns issues with severity and location.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: api-hub.lintApiSpec
      outputParameters:
      - type: object
        mapping: $.
    - name: list-registry-apis
      description: List APIs tracked in the Apigee Registry (legacy spec store, use for orgs not yet migrated to Hub).
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registry.listApis
      outputParameters:
      - type: object
        mapping: $.
    - name: list-registry-specs
      description: List spec artifacts in the Apigee Registry for a specific API version.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registry.listApiSpecs
      outputParameters:
      - type: object
        mapping: $.
