naftiko: 1.0.0-alpha2
info:
  label: Apigee Analytics and Traffic Observability
  description: Unified workflow for API traffic analytics and observability on Apigee — querying runtime analytics by dimension,
    discovering undocumented shadow APIs via APIM observation jobs, and correlating traffic patterns with known API products.
    Provides platform architects, SREs, and governance teams with the operational visibility needed to monitor performance,
    detect anomalies, and govern API usage at scale.
  tags:
  - Apigee
  - Analytics
  - Observability
  - Shadow API Discovery
  - Google Cloud
  created: '2026-04-20'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: api-management
    baseUri: https://apigee.googleapis.com/v1
    description: Apigee API Management REST API.
    authentication:
      type: bearer
      token: '{{GOOGLE_ACCESS_TOKEN}}'
    resources:
    - name: api-proxies
      path: /organizations/{organizationId}/apis
      operations:
      - name: listApiProxies
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: proxies
          type: array
          value: $.proxies
    - name: api-proxy
      path: /organizations/{organizationId}/apis/{apiId}
      operations:
      - name: getApiProxy
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: apiId
          in: path
        outputParameters:
        - name: proxy
          type: object
          value: $.
    - name: api-products
      path: /organizations/{organizationId}/apiproducts
      operations:
      - name: listApiProducts
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: products
          type: array
          value: $.products
    - name: api-product
      path: /organizations/{organizationId}/apiproducts/{productId}
      operations:
      - name: getApiProduct
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: productId
          in: path
        outputParameters:
        - name: product
          type: object
          value: $.
    - name: developers
      path: /organizations/{organizationId}/developers
      operations:
      - name: listDevelopers
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: developers
          type: array
          value: $.developers
    - name: developer
      path: /organizations/{organizationId}/developers/{developerId}
      operations:
      - name: getDeveloper
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: developerId
          in: path
        outputParameters:
        - name: developer
          type: object
          value: $.
    - name: developer-apps
      path: /organizations/{organizationId}/developers/{developerId}/apps
      operations:
      - name: listDeveloperApps
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: developerId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: apps
          type: array
          value: $.apps
    - name: developer-app
      path: /organizations/{organizationId}/developers/{developerId}/apps/{appId}
      operations:
      - name: getDeveloperApp
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: developerId
          in: path
        - name: appId
          in: path
        outputParameters:
        - name: app
          type: object
          value: $.
    - name: environments
      path: /organizations/{organizationId}/environments
      operations:
      - name: listEnvironments
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: environments
          type: array
          value: $.environments
    - name: environment
      path: /organizations/{organizationId}/environments/{environmentId}
      operations:
      - name: getEnvironment
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: environmentId
          in: path
        outputParameters:
        - name: environment
          type: object
          value: $.
    - name: deployments
      path: /organizations/{organizationId}/deployments
      operations:
      - name: listOrganizationDeployments
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        - name: filter
          in: query
        outputParameters:
        - name: deployments
          type: array
          value: $.deployments
    - name: proxy-deployment
      path: /organizations/{organizationId}/environments/{environmentId}/apis/{apiId}/revisions/{revisionId}/deployments
      operations:
      - name: deployApiProxyRevision
        method: POST
        inputParameters:
        - name: organizationId
          in: path
        - name: environmentId
          in: path
        - name: apiId
          in: path
        - name: revisionId
          in: path
        - name: override
          in: query
        outputParameters:
        - name: deployment
          type: object
          value: $.
      - name: undeployApiProxyRevision
        method: DELETE
        inputParameters:
        - name: organizationId
          in: path
        - name: environmentId
          in: path
        - name: apiId
          in: path
        - name: revisionId
          in: path
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: shared-flows
      path: /organizations/{organizationId}/sharedflows
      operations:
      - name: listSharedFlows
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: sharedFlows
          type: array
          value: $.sharedFlows
    - name: target-servers
      path: /organizations/{organizationId}/environments/{environmentId}/targetservers
      operations:
      - name: listTargetServers
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: environmentId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: targetServers
          type: array
          value: $.targetServers
    - name: analytics-stats
      path: /organizations/{organizationId}/environments/{environmentId}/stats/{statsType}
      operations:
      - name: getEnvironmentStats
        method: GET
        inputParameters:
        - name: organizationId
          in: path
        - name: environmentId
          in: path
        - name: statsType
          in: path
        - name: timeRange
          in: query
        - name: timeUnit
          in: query
        - name: filter
          in: query
        - name: limit
          in: query
        outputParameters:
        - name: stats
          type: object
          value: $.
  - type: http
    namespace: apim
    baseUri: https://apim.googleapis.com/v1alpha
    description: Apigee API Observation REST API.
    authentication:
      type: bearer
      token: '{{GOOGLE_ACCESS_TOKEN}}'
    resources:
    - name: observation-jobs
      path: /projects/{projectId}/locations/{locationId}/observationJobs
      operations:
      - name: listObservationJobs
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: observationJobs
          type: array
          value: $.observationJobs
    - name: observation-job
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}
      operations:
      - name: getObservationJob
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        outputParameters:
        - name: observationJob
          type: object
          value: $.
    - name: enable-observation-job
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}:enable
      operations:
      - name: enableObservationJob
        method: POST
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        outputParameters:
        - name: operation
          type: object
          value: $.
    - name: disable-observation-job
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}:disable
      operations:
      - name: disableObservationJob
        method: POST
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        outputParameters:
        - name: operation
          type: object
          value: $.
    - name: api-observations
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}/apiObservations
      operations:
      - name: listApiObservations
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: apiObservations
          type: array
          value: $.apiObservations
    - name: api-observation
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}/apiObservations/{apiObservationId}
      operations:
      - name: getApiObservation
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        - name: apiObservationId
          in: path
        outputParameters:
        - name: apiObservation
          type: object
          value: $.
    - name: batch-edit-observation-tags
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}/apiObservations:batchEditTags
      operations:
      - name: batchEditApiObservationTags
        method: POST
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        outputParameters:
        - name: apiObservations
          type: array
          value: $.apiObservations
    - name: api-operations
      path: /projects/{projectId}/locations/{locationId}/observationJobs/{observationJobId}/apiObservations/{apiObservationId}/apiOperations
      operations:
      - name: listApiOperations
        method: GET
        inputParameters:
        - name: projectId
          in: path
        - name: locationId
          in: path
        - name: observationJobId
          in: path
        - name: apiObservationId
          in: path
        - name: pageSize
          in: query
        - name: pageToken
          in: query
        outputParameters:
        - name: apiOperations
          type: array
          value: $.apiOperations
  exposes:
  - type: rest
    port: 8084
    namespace: apigee-analytics-api
    description: Unified REST API for Apigee analytics and traffic observability.
    resources:
    - path: /v1/analytics/stats
      name: analytics-stats
      description: Traffic analytics stats by dimension.
      operations:
      - method: GET
        name: get-stats
        description: Query traffic analytics for an environment.
        call: api-management.getEnvironmentStats
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/observation-jobs
      name: observation-jobs
      description: Shadow API observation jobs.
      operations:
      - method: GET
        name: list-observation-jobs
        description: List observation jobs.
        call: apim.listObservationJobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/observed-apis
      name: observed-apis
      description: Shadow APIs discovered by observation jobs.
      operations:
      - method: GET
        name: list-observed-apis
        description: List observed shadow APIs.
        call: apim.listApiObservations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9094
    namespace: apigee-analytics-mcp
    transport: http
    description: MCP server for AI-assisted Apigee analytics and shadow API observability.
    tools:
    - name: get-traffic-analytics
      description: Query API traffic analytics for an Apigee environment by dimension (e.g. apis, apiproducts, devs, apps).
        Returns request counts, latency, and error rates.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management.getEnvironmentStats
      outputParameters:
      - type: object
        mapping: $.
    - name: list-environments
      description: List all environments (dev, staging, prod) to identify which to query analytics for.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management.listEnvironments
      outputParameters:
      - type: object
        mapping: $.
    - name: list-observation-jobs
      description: List all shadow API observation jobs configured to detect undocumented APIs in traffic.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim.listObservationJobs
      outputParameters:
      - type: object
        mapping: $.
    - name: discover-shadow-apis
      description: List shadow APIs discovered by an observation job — APIs found in live traffic that are not yet documented
        or governed.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim.listApiObservations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-observed-api-operations
      description: List individual HTTP operations observed for a specific shadow API — method, path, count, and parameters
        seen in traffic.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apim.listApiOperations
      outputParameters:
      - type: object
        mapping: $.
    - name: list-deployments
      description: List all proxy deployments across environments to correlate with traffic anomalies.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-management.listOrganizationDeployments
      outputParameters:
      - type: object
        mapping: $.
