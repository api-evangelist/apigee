naftiko: 1.0.0-alpha2
info:
  label: Apigee Registry API
  description: 'Apigee Registry API. 5 operations. Lead operation: Apigee List APIs. Self-contained Naftiko capability covering
    one Apigee business surface.'
  tags:
  - Apigee
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIGEE_API_KEY: APIGEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: registry-general
    baseUri: https://apigeeregistry.googleapis.com/v1
    description: Apigee Registry API business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-locations-locationId-apis
      path: /projects/{projectId}/locations/{locationId}/apis
      operations:
      - name: listapis
        method: GET
        description: Apigee List APIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Filter expression to narrow the results.
        - name: orderBy
          in: query
          type: string
          description: Field to order results by.
      - name: createapi
        method: POST
        description: Apigee Create an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiId
          in: query
          type: string
          description: Required. The ID to use for the API.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-locations-locationId-apis-apiId
      path: /projects/{projectId}/locations/{locationId}/apis/{apiId}
      operations:
      - name: getapi
        method: GET
        description: Apigee Get an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapi
        method: PATCH
        description: Apigee Update an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: updateMask
          in: query
          type: string
          description: Required. Comma-separated list of fields to update.
          required: true
        - name: allowMissing
          in: query
          type: boolean
          description: If true, create the API if it does not exist.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapi
        method: DELETE
        description: Apigee Delete an API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: force
          in: query
          type: boolean
          description: If true, delete child resources as well.
    authentication:
      type: bearer
      token: '{{env.APIGEE_API_KEY}}'
  exposes:
  - type: rest
    namespace: registry-general-rest
    port: 8080
    description: REST adapter for Apigee Registry API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/projects/{projectid}/locations/{locationid}/apis
      name: projects-projectid-locations-locationid-apis
      description: REST surface for projects-projectId-locations-locationId-apis.
      operations:
      - method: GET
        name: listapis
        description: Apigee List APIs
        call: registry-general.listapis
        with:
          filter: rest.filter
          orderBy: rest.orderBy
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapi
        description: Apigee Create an API
        call: registry-general.createapi
        with:
          apiId: rest.apiId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/locations/{locationid}/apis/{apiid}
      name: projects-projectid-locations-locationid-apis-apiid
      description: REST surface for projects-projectId-locations-locationId-apis-apiId.
      operations:
      - method: GET
        name: getapi
        description: Apigee Get an API
        call: registry-general.getapi
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapi
        description: Apigee Update an API
        call: registry-general.updateapi
        with:
          updateMask: rest.updateMask
          allowMissing: rest.allowMissing
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapi
        description: Apigee Delete an API
        call: registry-general.deleteapi
        with:
          force: rest.force
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: registry-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Apigee Registry API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: apigee-list-apis
      description: Apigee List APIs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registry-general.listapis
      with:
        filter: tools.filter
        orderBy: tools.orderBy
      outputParameters:
      - type: object
        mapping: $.
    - name: apigee-create-api
      description: Apigee Create an API
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: registry-general.createapi
      with:
        apiId: tools.apiId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apigee-get-api
      description: Apigee Get an API
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: registry-general.getapi
      outputParameters:
      - type: object
        mapping: $.
    - name: apigee-update-api
      description: Apigee Update an API
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: registry-general.updateapi
      with:
        updateMask: tools.updateMask
        allowMissing: tools.allowMissing
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: apigee-delete-api
      description: Apigee Delete an API
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: registry-general.deleteapi
      with:
        force: tools.force
      outputParameters:
      - type: object
        mapping: $.
