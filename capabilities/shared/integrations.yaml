naftiko: "1.0.0-alpha1"

info:
  label: "Apigee Integrations"
  description: "Apigee Integrations API for managing Google Apigee integrations resources."
  tags:
    - Apigee
    - API Management
    - Google Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: integrations
      baseUri: https://integrations.googleapis.com
      description: "Apigee Integrations REST API."
      authentication:
        type: bearer
        token: "{{GOOGLE_ACCESS_TOKEN}}"
      resources: []

  exposes:
    - type: rest
      port: 8102
      namespace: integrations-rest
      resources: []

    - type: mcp
      port: 9102
      namespace: integrations-mcp
      transport: http
      tools: []
