naftiko: "1.0.0-alpha1"

info:
  label: "Apigee API Management"
  description: "Shared capability for Apigee API Management — proxies, products, developers, apps, environments, deployments, shared flows, target servers, and analytics."
  tags:
    - Apigee
    - API Management
    - Google Cloud
  created: "2026-04-19"
  modified: "2026-04-20"

binds:
  - namespace: env
    keys:
      GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: api-management
      baseUri: https://apigee.googleapis.com/v1
      description: "Apigee API Management REST API."
      authentication:
        type: bearer
        token: "{{GOOGLE_ACCESS_TOKEN}}"
      resources:

        - name: api-proxies
          path: /organizations/{organizationId}/apis
          operations:
            - name: listApiProxies
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: proxies
                  type: array
                  value: $.proxies

        - name: api-proxy
          path: /organizations/{organizationId}/apis/{apiId}
          operations:
            - name: getApiProxy
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: apiId
                  in: path
              outputParameters:
                - name: proxy
                  type: object
                  value: $.

        - name: api-products
          path: /organizations/{organizationId}/apiproducts
          operations:
            - name: listApiProducts
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: products
                  type: array
                  value: $.products

        - name: api-product
          path: /organizations/{organizationId}/apiproducts/{productId}
          operations:
            - name: getApiProduct
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: productId
                  in: path
              outputParameters:
                - name: product
                  type: object
                  value: $.

        - name: developers
          path: /organizations/{organizationId}/developers
          operations:
            - name: listDevelopers
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: developers
                  type: array
                  value: $.developers

        - name: developer
          path: /organizations/{organizationId}/developers/{developerId}
          operations:
            - name: getDeveloper
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: developerId
                  in: path
              outputParameters:
                - name: developer
                  type: object
                  value: $.

        - name: developer-apps
          path: /organizations/{organizationId}/developers/{developerId}/apps
          operations:
            - name: listDeveloperApps
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: developerId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: apps
                  type: array
                  value: $.apps

        - name: developer-app
          path: /organizations/{organizationId}/developers/{developerId}/apps/{appId}
          operations:
            - name: getDeveloperApp
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: developerId
                  in: path
                - name: appId
                  in: path
              outputParameters:
                - name: app
                  type: object
                  value: $.

        - name: environments
          path: /organizations/{organizationId}/environments
          operations:
            - name: listEnvironments
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: environments
                  type: array
                  value: $.environments

        - name: environment
          path: /organizations/{organizationId}/environments/{environmentId}
          operations:
            - name: getEnvironment
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: environmentId
                  in: path
              outputParameters:
                - name: environment
                  type: object
                  value: $.

        - name: deployments
          path: /organizations/{organizationId}/deployments
          operations:
            - name: listOrganizationDeployments
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: deployments
                  type: array
                  value: $.deployments

        - name: proxy-deployment
          path: /organizations/{organizationId}/environments/{environmentId}/apis/{apiId}/revisions/{revisionId}/deployments
          operations:
            - name: deployApiProxyRevision
              method: POST
              inputParameters:
                - name: organizationId
                  in: path
                - name: environmentId
                  in: path
                - name: apiId
                  in: path
                - name: revisionId
                  in: path
                - name: override
                  in: query
              outputParameters:
                - name: deployment
                  type: object
                  value: $.
            - name: undeployApiProxyRevision
              method: DELETE
              inputParameters:
                - name: organizationId
                  in: path
                - name: environmentId
                  in: path
                - name: apiId
                  in: path
                - name: revisionId
                  in: path
              outputParameters:
                - name: result
                  type: object
                  value: $.

        - name: shared-flows
          path: /organizations/{organizationId}/sharedflows
          operations:
            - name: listSharedFlows
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: sharedFlows
                  type: array
                  value: $.sharedFlows

        - name: target-servers
          path: /organizations/{organizationId}/environments/{environmentId}/targetservers
          operations:
            - name: listTargetServers
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: environmentId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: targetServers
                  type: array
                  value: $.targetServers

        - name: analytics-stats
          path: /organizations/{organizationId}/environments/{environmentId}/stats/{statsType}
          operations:
            - name: getEnvironmentStats
              method: GET
              inputParameters:
                - name: organizationId
                  in: path
                - name: environmentId
                  in: path
                - name: statsType
                  in: path
                - name: timeRange
                  in: query
                - name: timeUnit
                  in: query
                - name: filter
                  in: query
                - name: limit
                  in: query
              outputParameters:
                - name: stats
                  type: object
                  value: $.

  exposes:
    - type: rest
      port: 8100
      namespace: api-management-rest
      resources:
        - path: /proxies
          name: api-proxies
          description: "List API proxies."
          inputParameters:
            - name: organizationId
              in: query
              type: string
              description: "Apigee organization ID"
          operations:
            - method: GET
              call: api-management.listApiProxies
              with:
                organizationId: api-management-rest.organizationId
              outputParameters:
                - type: array
                  mapping: "$.proxies"

        - path: /products
          name: api-products
          description: "List API products."
          inputParameters:
            - name: organizationId
              in: query
              type: string
              description: "Apigee organization ID"
          operations:
            - method: GET
              call: api-management.listApiProducts
              with:
                organizationId: api-management-rest.organizationId
              outputParameters:
                - type: array
                  mapping: "$.products"

        - path: /developers
          name: developers
          description: "List developers."
          inputParameters:
            - name: organizationId
              in: query
              type: string
              description: "Apigee organization ID"
          operations:
            - method: GET
              call: api-management.listDevelopers
              with:
                organizationId: api-management-rest.organizationId
              outputParameters:
                - type: array
                  mapping: "$.developers"

        - path: /environments
          name: environments
          description: "List environments."
          inputParameters:
            - name: organizationId
              in: query
              type: string
              description: "Apigee organization ID"
          operations:
            - method: GET
              call: api-management.listEnvironments
              with:
                organizationId: api-management-rest.organizationId
              outputParameters:
                - type: array
                  mapping: "$.environments"

        - path: /deployments
          name: deployments
          description: "List deployments."
          inputParameters:
            - name: organizationId
              in: query
              type: string
              description: "Apigee organization ID"
          operations:
            - method: GET
              call: api-management.listOrganizationDeployments
              with:
                organizationId: api-management-rest.organizationId
              outputParameters:
                - type: array
                  mapping: "$.deployments"

    - type: mcp
      port: 9100
      namespace: api-management-mcp
      transport: http
      description: "MCP tools for Apigee API Management."
      tools:
        - name: list-api-proxies
          description: "List all API proxies in an Apigee organization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listApiProxies
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.proxies"

        - name: list-api-products
          description: "List all API products available to developers."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listApiProducts
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.products"

        - name: list-developers
          description: "List all registered developers in the organization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listDevelopers
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.developers"

        - name: list-environments
          description: "List all environments (dev, staging, prod) in the organization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listEnvironments
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.environments"

        - name: list-deployments
          description: "List all proxy deployments across the organization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listOrganizationDeployments
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.deployments"

        - name: list-shared-flows
          description: "List reusable shared flows in the organization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
          call: api-management.listSharedFlows
          with:
            organizationId: api-management-mcp.organizationId
          outputParameters:
            - type: array
              mapping: "$.sharedFlows"

        - name: get-analytics-stats
          description: "Query traffic analytics for an environment and stats type (e.g. apis, apiproducts, devs)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: organizationId
              type: string
              description: "Apigee organization ID"
              required: true
            - name: environmentId
              type: string
              description: "Environment name (e.g. prod)"
              required: true
            - name: statsType
              type: string
              description: "Dimension to query (e.g. apis, apiproducts, devs)"
              required: true
            - name: timeRange
              type: string
              description: "Time range for stats query (e.g. 01/01/2026 00:00~01/31/2026 23:59)"
              required: false
          call: api-management.getEnvironmentStats
          with:
            organizationId: api-management-mcp.organizationId
            environmentId: api-management-mcp.environmentId
            statsType: api-management-mcp.statsType
            timeRange: api-management-mcp.timeRange
          outputParameters:
            - type: object
              mapping: "$."
