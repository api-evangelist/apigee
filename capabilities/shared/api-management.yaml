naftiko: "1.0.0-alpha1"

info:
  label: "Apigee API Management"
  description: "Apigee API Management API for managing Google Apigee api management resources."
  tags:
    - Apigee
    - API Management
    - Google Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: api-management
      baseUri: https://apigee.googleapis.com
      description: "Apigee API Management REST API."
      authentication:
        type: bearer
        token: "{{GOOGLE_ACCESS_TOKEN}}"
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: api-management-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: api-management-mcp
      transport: http
      tools: []
