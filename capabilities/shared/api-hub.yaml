naftiko: "1.0.0-alpha1"

info:
  label: "Apigee API Hub"
  description: "Apigee API Hub API for managing Google Apigee api hub resources."
  tags:
    - Apigee
    - API Management
    - Google Cloud
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: api-hub
      baseUri: https://apihub.googleapis.com
      description: "Apigee API Hub REST API."
      authentication:
        type: bearer
        token: "{{GOOGLE_ACCESS_TOKEN}}"
      resources: []

  exposes:
    - type: rest
      port: 8101
      namespace: api-hub-rest
      resources: []

    - type: mcp
      port: 9101
      namespace: api-hub-mcp
      transport: http
      tools: []
