naftiko: "1.0.0-alpha1"

info:
  label: "Apigee API Hub"
  description: "Shared capability for Apigee API Hub — API catalog, versions, specs, deployments, dependencies, and resource search."
  tags:
    - Apigee
    - API Hub
    - API Governance
    - Google Cloud
  created: "2026-04-19"
  modified: "2026-04-20"

binds:
  - namespace: env
    keys:
      GOOGLE_ACCESS_TOKEN: GOOGLE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: api-hub
      baseUri: https://apihub.googleapis.com/v1
      description: "Apigee API Hub REST API."
      authentication:
        type: bearer
        token: "{{GOOGLE_ACCESS_TOKEN}}"
      resources:

        - name: apis
          path: /projects/{projectId}/locations/{locationId}/apis
          operations:
            - name: listApis
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: apis
                  type: array
                  value: $.apis

        - name: api
          path: /projects/{projectId}/locations/{locationId}/apis/{apiId}
          operations:
            - name: getApi
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: apiId
                  in: path
              outputParameters:
                - name: api
                  type: object
                  value: $.

        - name: api-versions
          path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions
          operations:
            - name: listApiVersions
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: apiId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: versions
                  type: array
                  value: $.versions

        - name: api-specs
          path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs
          operations:
            - name: listApiSpecs
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: apiId
                  in: path
                - name: versionId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
              outputParameters:
                - name: specs
                  type: array
                  value: $.specs

        - name: api-spec-contents
          path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs/{specId}:getContents
          operations:
            - name: getApiSpecContents
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: apiId
                  in: path
                - name: versionId
                  in: path
                - name: specId
                  in: path
              outputParameters:
                - name: contents
                  type: object
                  value: $.

        - name: api-spec-lint
          path: /projects/{projectId}/locations/{locationId}/apis/{apiId}/versions/{versionId}/specs/{specId}:lint
          operations:
            - name: lintApiSpec
              method: POST
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: apiId
                  in: path
                - name: versionId
                  in: path
                - name: specId
                  in: path
              outputParameters:
                - name: operation
                  type: object
                  value: $.

        - name: deployments
          path: /projects/{projectId}/locations/{locationId}/deployments
          operations:
            - name: listDeployments
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: deployments
                  type: array
                  value: $.deployments

        - name: dependencies
          path: /projects/{projectId}/locations/{locationId}/dependencies
          operations:
            - name: listDependencies
              method: GET
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
                - name: pageSize
                  in: query
                - name: pageToken
                  in: query
                - name: filter
                  in: query
              outputParameters:
                - name: dependencies
                  type: array
                  value: $.dependencies

        - name: search
          path: /projects/{projectId}/locations/{locationId}:searchResources
          operations:
            - name: searchResources
              method: POST
              inputParameters:
                - name: projectId
                  in: path
                - name: locationId
                  in: path
              outputParameters:
                - name: searchResults
                  type: array
                  value: $.searchResults

  exposes:
    - type: rest
      port: 8101
      namespace: api-hub-rest
      resources:
        - path: /apis
          name: apis
          description: "List APIs in the catalog."
          inputParameters:
            - name: projectId
              in: query
              type: string
              description: "Google Cloud project ID"
            - name: locationId
              in: query
              type: string
              description: "Google Cloud location (e.g. us-central1)"
          operations:
            - method: GET
              call: api-hub.listApis
              with:
                projectId: api-hub-rest.projectId
                locationId: api-hub-rest.locationId
              outputParameters:
                - type: array
                  mapping: "$.apis"

        - path: /deployments
          name: deployments
          description: "List deployments in the catalog."
          inputParameters:
            - name: projectId
              in: query
              type: string
            - name: locationId
              in: query
              type: string
          operations:
            - method: GET
              call: api-hub.listDeployments
              with:
                projectId: api-hub-rest.projectId
                locationId: api-hub-rest.locationId
              outputParameters:
                - type: array
                  mapping: "$.deployments"

        - path: /dependencies
          name: dependencies
          description: "List API dependencies."
          inputParameters:
            - name: projectId
              in: query
              type: string
            - name: locationId
              in: query
              type: string
          operations:
            - method: GET
              call: api-hub.listDependencies
              with:
                projectId: api-hub-rest.projectId
                locationId: api-hub-rest.locationId
              outputParameters:
                - type: array
                  mapping: "$.dependencies"

    - type: mcp
      port: 9101
      namespace: api-hub-mcp
      transport: http
      description: "MCP tools for Apigee API Hub."
      tools:
        - name: list-hub-apis
          description: "List all APIs catalogued in Apigee API Hub."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location (e.g. us-central1)"
              required: true
          call: api-hub.listApis
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
          outputParameters:
            - type: array
              mapping: "$.apis"

        - name: list-api-versions
          description: "List versions of a specific API in the catalog."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
            - name: apiId
              type: string
              description: "API identifier in the Hub"
              required: true
          call: api-hub.listApiVersions
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
            apiId: api-hub-mcp.apiId
          outputParameters:
            - type: array
              mapping: "$.versions"

        - name: list-api-specs
          description: "List specifications for a specific API version."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
            - name: apiId
              type: string
              description: "API identifier"
              required: true
            - name: versionId
              type: string
              description: "Version identifier"
              required: true
          call: api-hub.listApiSpecs
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
            apiId: api-hub-mcp.apiId
            versionId: api-hub-mcp.versionId
          outputParameters:
            - type: array
              mapping: "$.specs"

        - name: lint-api-spec
          description: "Lint an API specification for compliance and quality issues."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
            - name: apiId
              type: string
              description: "API identifier"
              required: true
            - name: versionId
              type: string
              description: "Version identifier"
              required: true
            - name: specId
              type: string
              description: "Spec identifier"
              required: true
          call: api-hub.lintApiSpec
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
            apiId: api-hub-mcp.apiId
            versionId: api-hub-mcp.versionId
            specId: api-hub-mcp.specId
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-hub-deployments
          description: "List all deployments tracked in API Hub."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
          call: api-hub.listDeployments
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
          outputParameters:
            - type: array
              mapping: "$.deployments"

        - name: list-api-dependencies
          description: "List dependencies between APIs to understand integration topology."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
          call: api-hub.listDependencies
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
          outputParameters:
            - type: array
              mapping: "$.dependencies"

        - name: search-hub-resources
          description: "Search across all API Hub resources — APIs, versions, specs, deployments."
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          inputParameters:
            - name: projectId
              type: string
              description: "Google Cloud project ID"
              required: true
            - name: locationId
              type: string
              description: "Google Cloud location"
              required: true
          call: api-hub.searchResources
          with:
            projectId: api-hub-mcp.projectId
            locationId: api-hub-mcp.locationId
          outputParameters:
            - type: array
              mapping: "$.searchResults"
