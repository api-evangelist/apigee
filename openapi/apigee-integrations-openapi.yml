          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createSfdcChannel
      summary: Apigee Create an SFDC Channel
      description: >-
        Creates a new Salesforce channel within an SFDC instance.
      tags:
      - SFDC Channels
      parameters:
      - $ref: '#/components/parameters/projectId'
      - $ref: '#/components/parameters/locationId'
      - $ref: '#/components/parameters/productId'
      - $ref: '#/components/parameters/sfdcInstanceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SfdcChannel'
      responses:
        '200':
          description: Successful response with the created channel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SfdcChannel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: Google OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/cloud-platform: Full access to Google Cloud Platform resources
  parameters:
    projectId:
      name: projectId
      in: path
      description: Google Cloud project ID.
      required: true
      schema:
        type: string
    locationId:
      name: locationId
      in: path
      description: Google Cloud region or location.
      required: true
      schema:
        type: string
    productId:
      name: productId
      in: path
      description: Product identifier (typically the Apigee product name).
      required: true
      schema:
        type: string
    integrationId:
      name: integrationId
      in: path
      description: Name of the integration.
      required: true
      schema:
        type: string
    versionId:
      name: versionId
      in: path
      description: Integration version identifier.
      required: true
      schema:
        type: string
    executionId:
      name: executionId
      in: path
      description: Execution identifier.
      required: true
      schema:
        type: string
    suspensionId:
      name: suspensionId
      in: path
      description: Suspension identifier.
      required: true
      schema:
        type: string
    authConfigId:
      name: authConfigId
      in: path
      description: Auth config identifier.
      required: true
      schema:
        type: string
    certificateId:
      name: certificateId
      in: path
      description: Certificate identifier.
      required: true
      schema:
        type: string
    sfdcInstanceId:
      name: sfdcInstanceId
      in: path
      description: SFDC instance identifier.
      required: true
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
    pageToken:
      name: pageToken
      in: query
      description: Page token returned from a previous list request.
      schema:
        type: string
  schemas:
    IntegrationVersion:
      type: object
      description: A version of an integration containing the complete configuration.
      properties:
        name:
          type: string
          description: Output only. Resource name of the version.
          readOnly: true
        description:
          type: string
          description: Description of the integration version.
        taskConfigs:
          type: array
          description: List of task configurations in the integration.
          items:
            $ref: '#/components/schemas/TaskConfig'
        triggerConfigs:
          type: array
          description: List of trigger configurations.
          items:
            $ref: '#/components/schemas/TriggerConfig'
        integrationParameters:
          type: array
          description: Parameters used by the integration.
          items:
            $ref: '#/components/schemas/IntegrationParameter'
        state:
          type: string
          description: State of the integration version.
          enum:
          - INTEGRATION_STATE_UNSPECIFIED
          - DRAFT
          - ACTIVE
          - ARCHIVED
          - SNAPSHOT
        snapshotNumber:
          type: string
          format: int64
          description: Output only. Auto-incrementing snapshot number.
          readOnly: true
        createTime:
          type: string
          format: date-time
          description: Output only. Time the version was created.
          readOnly: true
        lastModifierEmail:
          type: string
          description: Output only. Email of the last person who modified.
          readOnly: true
        parentTemplateId:
          type: string
          description: ID of the template this version was created from.
        userLabel:
          type: string
          description: User-defined label for the version.
        databasePersistencePolicy:
          type: string
          description: Database persistence policy for execution logs.
          enum:
          - DATABASE_PERSISTENCE_POLICY_UNSPECIFIED
          - DATABASE_PERSISTENCE_DISABLED
          - DATABASE_PERSISTENCE_ASYNC
    TaskConfig:
      type: object
      description: Configuration for a task in an integration.
      properties:
        task:
          type: string
          description: Type of the task (e.g., GenericRestV2Task, FieldMappingTask).
        taskId:
          type: string
          description: Unique ID of the task within the integration.
        displayName:
          type: string
          description: Display name for the task.
        parameters:
          type: object
          description: Task parameters.
          additionalProperties:
            $ref: '#/components/schemas/EventParameter'
        nextTasks:
          type: array
          description: Tasks to execute next.
          items:
            type: object
            properties:
              taskId:
                type: string
              condition:
                type: string
              displayName:
                type: string
              description:
                type: string
        taskExecutionStrategy:
          type: string
          description: Execution strategy for the task.
          enum:
          - WHEN_ALL_SUCCEED
          - WHEN_ANY_SUCCEED
          - WHEN_ALL_TASKS_AND_CONDITIONS_SUCCEED
        failurePolicy:
          type: object
          description: Policy for handling task failures.
          properties:
            retryStrategy:
              type: string
              enum:
              - RETRY_STRATEGY_UNSPECIFIED
              - IGNORE
              - NONE
              - FATAL
              - FIXED_INTERVAL
              - LINEAR_BACKOFF
              - EXPONENTIAL_BACKOFF
              - RESTART_INTEGRATION_WITH_BACKOFF
            maxRetries:
              type: integer
              format: int32
            intervalTime:
              type: string
              format: date-time
    TriggerConfig:
      type: object
      description: Configuration for a trigger that starts an integration.
      properties:
        trigger:
          type: string
          description: Type of the trigger.
        triggerId:
          type: string
          description: Unique ID of the trigger.
        label:
          type: string
          description: Label for the trigger.
        description:
          type: string
          description: Description of the trigger.
        triggerType:
          type: string
          description: Trigger type.
          enum:
          - TRIGGER_TYPE_UNSPECIFIED
          - CRON
          - API
          - SFDC_CHANNEL
          - CLOUD_PUBSUB_EXTERNAL
          - SFDC_CDC_CHANNEL
          - CLOUD_SCHEDULER
          - INTEGRATION_CONNECTOR_TRIGGER
        triggerNumber:
          type: string
          description: Number for ordering triggers.
        startTasks:
          type: array
          description: Tasks to start when trigger fires.
          items:
            type: object
            properties:
              taskId:
                type: string
              condition:
                type: string
              displayName:
                type: string
        properties:
          type: object
          description: Trigger-specific properties.
          additionalProperties:
            type: string
    IntegrationParameter:
      type: object
      description: A parameter used in an integration.
      properties:
        key:
          type: string
          description: Name of the parameter.
        dataType:
          type: string
          description: Data type of the parameter.
          enum:
          - INTEGRATION_PARAMETER_DATA_TYPE_UNSPECIFIED
          - STRING_VALUE
          - INT_VALUE
          - DOUBLE_VALUE
          - BOOLEAN_VALUE
          - STRING_ARRAY
          - INT_ARRAY
          - DOUBLE_ARRAY
          - BOOLEAN_ARRAY
          - JSON_VALUE
          - PROTO_VALUE
          - PROTO_ARRAY
        defaultValue:
          $ref: '#/components/schemas/ValueType'
        inputOutputType:
          type: string
          description: Whether the parameter is input, output, or both.
          enum:
          - IN_OUT_TYPE_UNSPECIFIED
          - IN
          - OUT
          - IN_OUT
        isTransient:
          type: boolean
          description: Whether the parameter is transient.
        producer:
          type: string
          description: Task that produces this parameter.
    ValueType:
      type: object
      description: A value with a specific type.
      properties:
        stringValue:
          type: string
        intValue:
          type: string
          format: int64
        doubleValue:
          type: number
          format: double
        booleanValue:
          type: boolean
        stringArray:
          type: object
          properties:
            stringValues:
              type: array
              items:
                type: string
        jsonValue:
          type: string
    EventParameter:
      type: object
      description: A parameter with a key and value.
      properties:
        key:
          type: string
        value:
          $ref: '#/components/schemas/ValueType'
    Execution:
      type: object
      description: An integration execution record.
      properties:
        name:
          type: string
          description: Output only. Resource name of the execution.
          readOnly: true
        executionMethod:
          type: string
          description: Method by which the execution was triggered.
          enum:
          - EXECUTION_METHOD_UNSPECIFIED
          - POST
          - POST_TO_QUEUE
          - SCHEDULE
        requestParams:
          type: object
          description: Input parameters for the execution.
          additionalProperties:
            $ref: '#/components/schemas/EventParameter'
        responseParams:
          type: object
          description: Output parameters from the execution.
          additionalProperties:
            $ref: '#/components/schemas/EventParameter'
        executionDetails:
          type: object
          description: Detailed execution information.
          properties:
            state:
              type: string
              enum:
              - STATE_UNSPECIFIED
              - PENDING
              - PROCESSING
              - SUCCEEDED
              - FAILED
              - CANCELLED
              - RETRY_ON_HOLD
              - SUSPENDED
            executionSnapshots:
              type: array
              items:
                type: object
                properties:
                  checkpointTaskNumber:
                    type: string
                  executionSnapshotMetadata:
                    type: object
                    properties:
                      executionAttempt:
                        type: integer
                        format: int32
                      task:
                        type: string
                      taskLabel:
                        type: string
        createTime:
          type: string
          format: date-time
          description: Output only. Time the execution was created.
          readOnly: true
        updateTime:
          type: string
          format: date-time
          description: Output only. Time the execution was last updated.
          readOnly: true
        triggerId:
          type: string
          description: ID of the trigger that started the execution.
        integrationVersionId:
          type: string
          description: ID of the integration version executed.
    AuthConfig:
      type: object
      description: Authentication configuration for connecting to external services.
      properties:
        name:
          type: string
          description: Output only. Resource name of the auth config.
          readOnly: true
        displayName:
          type: string
          description: Display name for the auth config.
        description:
          type: string
          description: Description of the auth config.
        certificateId:
          type: string
          description: Certificate to use for authentication.
        credentialType:
          type: string
          description: Type of credential stored.
          enum:
          - CREDENTIAL_TYPE_UNSPECIFIED
          - USERNAME_AND_PASSWORD
          - API_KEY
          - OAUTH2_AUTHORIZATION_CODE
          - OAUTH2_IMPLICIT
          - OAUTH2_CLIENT_CREDENTIALS
          - OAUTH2_RESOURCE_OWNER_CREDENTIALS
          - JWT
          - AUTH_TOKEN
          - SERVICE_ACCOUNT
          - CLIENT_CERTIFICATE_ONLY
          - OIDC_TOKEN
        visibility:
          type: string
          description: Visibility of the auth config.
          enum:
          - AUTH_CONFIG_VISIBILITY_UNSPECIFIED
          - PRIVATE
          - CLIENT_VISIBLE
        state:
          type: string
          description: State of the auth config.
          enum:
          - STATE_UNSPECIFIED
          - VALID
          - INVALID
          - SOFT_DELETED
          - EXPIRED
          - UNAUTHORIZED
          - UNSUPPORTED
        expiryNotificationDuration:
          type: array
          description: Notification durations before expiry.
          items:
            type: string
        createTime:
          type: string
          format: date-time
          description: Output only. Time the config was created.
          readOnly: true
        lastModifierEmail:
          type: string
          description: Output only. Email of the last modifier.
          readOnly: true
        validTime:
          type: string
          format: date-time
          description: Output only. Time until which the config is valid.
          readOnly: true
    Certificate:
      type: object
      description: An SSL/TLS certificate.
      properties:
        name:
          type: string
          description: Output only. Resource name of the certificate.
          readOnly: true
        displayName:
          type: string
          description: Display name of the certificate.
        description:
          type: string
          description: Description of the certificate.
        rawCertificate:
          type: object
          description: Raw certificate data.
          properties:
            sslCertificate:
              type: string
              description: PEM-encoded SSL certificate.
            encryptedPrivateKey:
              type: string
              description: Encrypted private key.
            passphrase:
              type: string
              description: Passphrase for the private key.
        certificateStatus:
          type: string
          description: Output only. Status of the certificate.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - ACTIVE
          - EXPIRED
        validStartTime:
          type: string
          format: date-time
          description: Output only. Start of validity period.
          readOnly: true
        validEndTime:
          type: string
          format: date-time
          description: Output only. End of validity period.
          readOnly: true
    SfdcInstance:
      type: object
      description: A Salesforce instance configuration.
      properties:
        name:
          type: string
          description: Output only. Resource name of the SFDC instance.
          readOnly: true
        displayName:
          type: string
          description: Display name for the instance.
        description:
          type: string
          description: Description of the SFDC instance.
        sfdcOrgId:
          type: string
          description: Salesforce organization ID.
        authConfigId:
          type: array
          description: Auth configs associated with this instance.
          items:
            type: string
        serviceAuthority:
          type: string
          description: Service authority URL for the Salesforce instance.
        createTime:
          type: string
          format: date-time
          description: Output only. Time the instance was created.
          readOnly: true
        updateTime:
          type: string
          format: date-time
          description: Output only. Time the instance was last updated.
          readOnly: true
        deleteTime:
          type: string
          format: date-time
          description: Output only. Time the instance was deleted.
          readOnly: true
    SfdcChannel:
      type: object
      description: A Salesforce channel configuration.
      properties:
        name:
          type: string
          description: Output only. Resource name of the SFDC channel.
          readOnly: true
        displayName:
          type: string
          description: Display name for the channel.
        description:
          type: string
          description: Description of the channel.
