      responses:
        '200':
          description: Successful response with the created instance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SfdcInstance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
