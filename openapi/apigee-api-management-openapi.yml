  /organizations/{organizationId}/instances:
    get:
      operationId: listInstances
      summary: Apigee List Runtime Instances
      description: >-
        Lists all Apigee runtime instances for the organization.
      tags:
      - Instances
      parameters:
      - $ref: '#/components/parameters/organizationId'
      - $ref: '#/components/parameters/pageSize'
      - $ref: '#/components/parameters/pageToken'
      responses:
        '200':
          description: Successful response with list of instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListInstancesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createInstance
      summary: Apigee Create a Runtime Instance
      description: >-
        Creates an Apigee runtime instance. This is a long-running
        operation that provisions the infrastructure for API runtime.
      tags:
      - Instances
      parameters:
      - $ref: '#/components/parameters/organizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Instance'
      responses:
        '200':
          description: Successful response with long-running operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organizations/{organizationId}/instances/{instanceId}:
    get:
      operationId: getInstance
      summary: Apigee Get a Runtime Instance
      description: >-
        Gets the details for an Apigee runtime instance, including
        state, host, port, and location.
      tags:
      - Instances
      parameters:
      - $ref: '#/components/parameters/organizationId'
      - name: instanceId
        in: path
        description: Name of the runtime instance.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response with instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteInstance
      summary: Apigee Delete a Runtime Instance
      description: >-
        Deletes an Apigee runtime instance. This is a long-running
        operation that deprovisions the runtime infrastructure.
      tags:
      - Instances
      parameters:
      - $ref: '#/components/parameters/organizationId'
      - name: instanceId
        in: path
        description: Name of the runtime instance.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response with long-running operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: Google OAuth 2.0 authentication
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/cloud-platform: Full access to Google Cloud Platform resources
  parameters:
    organizationId:
      name: organizationId
      in: path
      description: Name of the Apigee organization.
      required: true
      schema:
        type: string
    apiId:
      name: apiId
      in: path
      description: Name of the API proxy.
      required: true
      schema:
        type: string
    revisionId:
      name: revisionId
      in: path
      description: Revision number of the API proxy.
      required: true
      schema:
        type: string
    apiProductId:
      name: apiProductId
      in: path
      description: Name of the API product.
      required: true
      schema:
        type: string
    developerId:
      name: developerId
      in: path
      description: Email address or ID of the developer.
      required: true
      schema:
        type: string
    appId:
      name: appId
      in: path
      description: Name of the developer app.
      required: true
      schema:
        type: string
    keyId:
      name: keyId
      in: path
      description: Consumer key of the developer app.
      required: true
      schema:
        type: string
    environmentId:
      name: environmentId
      in: path
      description: Name of the environment.
      required: true
      schema:
        type: string
    targetServerId:
      name: targetServerId
      in: path
      description: Name of the target server.
      required: true
      schema:
        type: string
    sharedFlowId:
      name: sharedFlowId
      in: path
      description: Name of the shared flow.
      required: true
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: Maximum number of items to return per page.
      schema:
        type: integer
        format: int32
    pageToken:
      name: pageToken
      in: query
      description: Page token returned from a previous list request.
      schema:
        type: string
  schemas:
    Organization:
      type: object
      description: Represents an Apigee organization.
      properties:
        name:
          type: string
          description: Output only. Name of the Apigee organization.
          readOnly: true
        displayName:
          type: string
          description: Display name for the organization.
        description:
          type: string
          description: Description of the organization.
        projectId:
          type: string
          description: Output only. Project ID associated with the organization.
          readOnly: true
        createdAt:
          type: string
          format: int64
          description: Output only. Time the organization was created in milliseconds since epoch.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Time the organization was last modified in milliseconds since epoch.
          readOnly: true
        subscriptionType:
          type: string
          description: Output only. Subscription type of the organization.
          readOnly: true
          enum:
          - SUBSCRIPTION_TYPE_UNSPECIFIED
          - PAID
          - TRIAL
        state:
          type: string
          description: Output only. State of the organization.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - CREATING
          - ACTIVE
          - DELETING
          - UPDATING
        analyticsRegion:
          type: string
          description: Required. Primary Google Cloud region for analytics data storage.
        runtimeType:
          type: string
          description: Required. Runtime type of the Apigee organization.
          enum:
          - RUNTIME_TYPE_UNSPECIFIED
          - CLOUD
          - HYBRID
        authorizedNetwork:
          type: string
          description: VPC network used for service networking.
        environments:
          type: array
          description: Output only. List of environments in the organization.
          readOnly: true
          items:
            type: string
        properties:
          $ref: '#/components/schemas/Properties'
        billingType:
          type: string
          description: Billing type of the organization.
          enum:
          - BILLING_TYPE_UNSPECIFIED
          - SUBSCRIPTION
          - EVALUATION
          - PAYG
    ApiProxy:
      type: object
      description: Metadata about an API proxy.
      properties:
        name:
          type: string
          description: Output only. Name of the API proxy.
          readOnly: true
        revision:
          type: array
          description: Output only. List of revisions defined for the API proxy.
          readOnly: true
          items:
            type: string
        latestRevisionId:
          type: string
          description: Output only. The ID of the most recently created revision.
          readOnly: true
        metaData:
          $ref: '#/components/schemas/EntityMetadata'
        labels:
          type: object
          description: User-defined labels for organizing API proxies.
          additionalProperties:
            type: string
        readOnly:
          type: boolean
          description: Output only. Whether this proxy is read-only.
          readOnly: true
        apiProxyType:
          type: string
          description: Type of the API proxy.
          enum:
          - API_PROXY_TYPE_UNSPECIFIED
          - PROGRAMMABLE
          - CONFIGURABLE
    ApiProxyRevision:
      type: object
      description: API proxy revision metadata and configuration.
      properties:
        name:
          type: string
          description: Output only. Resource name of the API proxy revision.
          readOnly: true
        revision:
          type: string
          description: Output only. Revision number of the proxy.
          readOnly: true
        displayName:
          type: string
          description: Human-readable name of the API proxy.
        description:
          type: string
          description: Description of the API proxy revision.
        createdAt:
          type: string
          format: date-time
          description: Output only. Time the revision was created.
          readOnly: true
        lastModifiedAt:
          type: string
          format: date-time
          description: Output only. Time the revision was last modified.
          readOnly: true
        basepaths:
          type: array
          description: Base path(s) for the API proxy.
          items:
            type: string
        policies:
          type: array
          description: List of policy names included in this revision.
          items:
            type: string
        resources:
          type: array
          description: List of resource files included in this revision.
          items:
            type: string
        proxies:
          type: array
          description: List of proxy endpoint names in this revision.
          items:
            type: string
        targets:
          type: array
          description: List of target endpoint names in this revision.
          items:
            type: string
        sharedFlows:
          type: array
          description: List of shared flows referenced by this revision.
          items:
            type: string
        type:
          type: string
          description: The type of the revision (e.g., Application).
    ApiProduct:
      type: object
      description: An API product bundles API resources for consumption.
      properties:
        name:
          type: string
          description: Internal name of the API product. Must be unique.
        displayName:
          type: string
          description: Name displayed in the developer portal.
        description:
          type: string
          description: Description of the API product.
        approvalType:
          type: string
          description: How API keys are approved for the product.
          enum:
          - manual
          - auto
        attributes:
          type: array
          description: Custom attributes for the API product (max 18).
          items:
            $ref: '#/components/schemas/Attribute'
        environments:
          type: array
          description: Environments where this product is available.
          items:
            type: string
        proxies:
          type: array
          description: API proxies included in this product.
          items:
            type: string
        scopes:
          type: array
          description: OAuth scopes associated with the product.
          items:
            type: string
        quota:
          type: string
          description: Number of requests permitted per quota interval.
        quotaInterval:
          type: string
          description: Time interval over which the quota is applied.
        quotaTimeUnit:
          type: string
          description: Time unit for the quota interval.
          enum:
          - minute
          - hour
          - day
          - month
        operationGroup:
          $ref: '#/components/schemas/OperationGroup'
        createdAt:
          type: string
          format: int64
          description: Output only. Unix time when the product was created.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Unix time when the product was last modified.
          readOnly: true
    Developer:
      type: object
      description: A developer registered in an Apigee organization.
      properties:
        email:
          type: string
          format: email
          description: >-
            Required. Email address of the developer. Used as the unique
            identifier for the developer.
        firstName:
          type: string
          description: Required. First name of the developer.
        lastName:
          type: string
          description: Required. Last name of the developer.
        userName:
          type: string
          description: Required. User name of the developer.
        developerId:
          type: string
          description: Output only. ID of the developer.
          readOnly: true
        organizationName:
          type: string
          description: Output only. Name of the Apigee organization.
          readOnly: true
        status:
          type: string
          description: Status of the developer. Valid values are active or inactive.
        apps:
          type: array
          description: Output only. List of apps owned by the developer.
          readOnly: true
          items:
            type: string
        attributes:
          type: array
          description: Custom attributes for the developer (max 18).
          items:
            $ref: '#/components/schemas/Attribute'
        companies:
          type: array
          description: Output only. Companies associated with the developer.
          readOnly: true
          items:
            type: string
        createdAt:
          type: string
          format: int64
          description: Output only. Time the developer was created in milliseconds since epoch.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Time the developer was last modified in milliseconds since epoch.
          readOnly: true
        accessType:
          type: string
          description: Access type of the developer.
      required:
      - email
      - firstName
      - lastName
      - userName
    DeveloperApp:
      type: object
      description: A developer app that is associated with a developer.
      properties:
        name:
          type: string
          description: Name of the developer app.
        appId:
          type: string
          description: Output only. ID of the developer app.
          readOnly: true
        developerId:
          type: string
          description: Output only. Developer ID of the owning developer.
          readOnly: true
        apiProducts:
          type: array
          description: List of API products associated with the app.
          items:
            type: string
        attributes:
          type: array
          description: Custom attributes for the developer app.
          items:
            $ref: '#/components/schemas/Attribute'
        callbackUrl:
          type: string
          description: Callback URL used by OAuth 2.0 authorization servers.
        credentials:
          type: array
          description: Output only. Credentials (API keys) for the app.
          readOnly: true
          items:
            $ref: '#/components/schemas/DeveloperAppKey'
        status:
          type: string
          description: Status of the developer app (approved or revoked).
        scopes:
          type: array
          description: OAuth scopes associated with the app.
          items:
            type: string
        createdAt:
          type: string
          format: int64
          description: Output only. Time the app was created in milliseconds since epoch.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Time the app was last modified.
          readOnly: true
    DeveloperAppKey:
      type: object
      description: Consumer key and secret for a developer app.
      properties:
        consumerKey:
          type: string
          description: Consumer key (API key) for the developer app.
        consumerSecret:
          type: string
          description: Consumer secret for the developer app.
        apiProducts:
          type: array
          description: API products associated with this key.
          items:
            type: object
            properties:
              apiproduct:
                type: string
                description: Name of the API product.
              status:
                type: string
                description: Approval status (approved, pending, revoked).
        status:
          type: string
          description: Status of the credential (approved or revoked).
        expiresAt:
          type: string
          format: int64
          description: Time the key expires in milliseconds since epoch. -1 means never.
        issuedAt:
          type: string
          format: int64
          description: Output only. Time the key was issued in milliseconds since epoch.
          readOnly: true
        scopes:
          type: array
          description: OAuth scopes granted to the key.
          items:
            type: string
        attributes:
          type: array
          description: Custom attributes for the key.
          items:
            $ref: '#/components/schemas/Attribute'
    Environment:
      type: object
      description: An environment in an Apigee organization for API proxy deployment.
      properties:
        name:
          type: string
          description: Required. Name of the environment.
        displayName:
          type: string
          description: Display name for the environment.
        description:
          type: string
          description: Description of the environment.
        state:
          type: string
          description: Output only. State of the environment.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - CREATING
          - ACTIVE
          - DELETING
          - UPDATING
        createdAt:
          type: string
          format: int64
          description: Output only. Creation time in milliseconds since epoch.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Last modification time.
          readOnly: true
        deploymentType:
          type: string
          description: Deployment type of the environment.
          enum:
          - DEPLOYMENT_TYPE_UNSPECIFIED
          - PROXY
          - ARCHIVE
        apiProxyType:
          type: string
          description: Type of API proxies deployed in this environment.
          enum:
          - API_PROXY_TYPE_UNSPECIFIED
          - PROGRAMMABLE
          - CONFIGURABLE
        properties:
          $ref: '#/components/schemas/Properties'
        nodeConfig:
          $ref: '#/components/schemas/NodeConfig'
        forwardProxyUri:
          type: string
          description: Optional forward proxy URI for the environment.
        type:
          type: string
          description: Type of the environment.
          enum:
          - ENVIRONMENT_TYPE_UNSPECIFIED
          - BASE
          - INTERMEDIATE
          - COMPREHENSIVE
    Deployment:
      type: object
      description: Represents a deployment of an API proxy revision to an environment.
      properties:
        environment:
          type: string
          description: Environment where the proxy is deployed.
        apiProxy:
          type: string
          description: API proxy name.
        revision:
          type: string
          description: API proxy revision number.
        deployStartTime:
          type: string
          format: date-time
          description: Time the deployment was initiated.
        state:
          type: string
          description: Current state of the deployment.
          enum:
          - RUNTIME_STATE_UNSPECIFIED
          - READY
          - PROGRESSING
          - ERROR
        pods:
          type: array
          description: Status reported by individual runtime pods.
          items:
            $ref: '#/components/schemas/PodStatus'
        routeConflicts:
          type: array
          description: Conflicts with other deployments that share the same base path.
          items:
            type: object
            properties:
              deployedRevision:
                type: string
              environmentGroup:
                type: string
    TargetServer:
      type: object
      description: Configuration for a backend target server.
      properties:
        name:
          type: string
          description: Required. Name of the target server.
        host:
          type: string
          description: Required. Hostname or IP address of the backend service.
        port:
          type: integer
          format: int32
          description: Required. Port number of the backend service.
        isEnabled:
          type: boolean
          description: Whether the target server is enabled.
        protocol:
          type: string
          description: Protocol used to communicate with the target.
          enum:
          - HTTP
          - HTTP2
          - GRPC_TARGET
          - GRPC
          - EXTERNAL_CALLOUT
        sSLInfo:
          $ref: '#/components/schemas/TlsInfo'
        description:
          type: string
          description: Optional description of the target server.
      required:
      - name
      - host
      - port
    KeyValueMap:
      type: object
      description: A key value map used for runtime data storage.
      properties:
        name:
          type: string
          description: Required. Name of the key value map.
        encrypted:
          type: boolean
          description: Whether the values in the map are encrypted.
    SharedFlow:
      type: object
      description: A reusable shared flow containing common logic.
      properties:
        name:
          type: string
          description: Output only. Name of the shared flow.
          readOnly: true
        revision:
          type: array
          description: Output only. List of revisions for the shared flow.
          readOnly: true
          items:
            type: string
        latestRevisionId:
          type: string
          description: Output only. ID of the latest revision.
          readOnly: true
        metaData:
          $ref: '#/components/schemas/EntityMetadata'
    SharedFlowRevision:
      type: object
      description: Metadata and details for a specific shared flow revision.
      properties:
        name:
          type: string
          description: Resource name of the shared flow revision.
        revision:
          type: string
          description: Revision number.
        displayName:
          type: string
          description: Human-readable name.
        description:
          type: string
          description: Description of the revision.
        createdAt:
          type: string
          format: date-time
          description: Time the revision was created.
        lastModifiedAt:
          type: string
          format: date-time
          description: Time the revision was last modified.
        policies:
          type: array
          description: List of policies in the shared flow.
          items:
            type: string
        resources:
          type: array
          description: List of resource files.
          items:
            type: string
        sharedFlows:
          type: array
          description: List of referenced shared flows.
          items:
            type: string
    AppGroup:
      type: object
      description: A group of developers and their applications.
      properties:
        name:
          type: string
          description: Output only. Resource name of the app group.
          readOnly: true
        appGroupId:
          type: string
          description: Output only. Internal ID of the app group.
          readOnly: true
        displayName:
          type: string
          description: Display name of the app group.
        channelUri:
          type: string
          description: URI of the communication channel for the group.
        channelId:
          type: string
          description: Channel ID for the group.
        status:
          type: string
          description: Status of the app group.
        attributes:
          type: array
          description: Custom attributes for the app group.
          items:
            $ref: '#/components/schemas/Attribute'
        createdAt:
          type: string
          format: int64
          description: Output only. Time the app group was created.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Time the app group was last modified.
          readOnly: true
    Instance:
      type: object
      description: An Apigee runtime instance.
      properties:
        name:
          type: string
          description: Required. Resource name of the instance.
        location:
          type: string
          description: Required. Google Cloud region where the instance resides.
        host:
          type: string
          description: Output only. Internal hostname of the instance.
          readOnly: true
        port:
          type: string
          description: Output only. Port number of the instance.
          readOnly: true
        state:
          type: string
          description: Output only. State of the instance.
          readOnly: true
          enum:
          - STATE_UNSPECIFIED
          - CREATING
          - ACTIVE
          - DELETING
          - UPDATING
        description:
          type: string
          description: Description of the instance.
        displayName:
          type: string
          description: Display name for the instance.
        createdAt:
          type: string
          format: int64
          description: Output only. Time the instance was created.
          readOnly: true
        lastModifiedAt:
          type: string
          format: int64
          description: Output only. Time the instance was last modified.
          readOnly: true
        diskEncryptionKeyName:
          type: string
          description: Customer-managed encryption key (CMEK) for the instance disk.
        ipRange:
          type: string
          description: IP range for peering with the customer VPC.
        peeringCidrRange:
          type: string
          description: Size of the CIDR block range for peering.
          enum:
          - SLASH_16
          - SLASH_20
          - SLASH_22
          - SLASH_23
          - SLASH_24
    Datastore:
      type: object
      description: Configuration for an analytics data store.
      properties:
        displayName:
          type: string
          description: Required. Display name for the data store.
        self:
          type: string
          description: Output only. Resource URI of the data store.
          readOnly: true
        org:
          type: string
          description: Output only. Organization associated with the data store.
          readOnly: true
        targetType:
          type: string
          description: Required. Type of target for data export.
        datastoreConfig:
          type: object
          description: Configuration for the data store target.
          properties:
            projectId:
              type: string
              description: Google Cloud project ID.
            bucketName:
              type: string
              description: Cloud Storage bucket name.
            path:
              type: string
              description: Path within the bucket.
            datasetName:
              type: string
              description: BigQuery dataset name.
            tablePrefix:
              type: string
              description: Prefix for BigQuery table names.
        createTime:
          type: string
          format: date-time
          description: Output only. Time the data store was created.
          readOnly: true
        lastUpdateTime:
          type: string
          format: date-time
          description: Output only. Time the data store was last updated.
          readOnly: true
    Stats:
      type: object
      description: Analytics statistics response.
      properties:
        environments:
          type: array
          description: List of environment statistics.
          items:
            type: object
            properties:
              name:
                type: string
              dimensions:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    metrics:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          values:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: string
                                value:
                                  type: string
        metaData:
          type: object
          description: Metadata about the statistics response.
          properties:
            errors:
              type: array
              items:
                type: string
            notices:
              type: array
              items:
                type: string
    Attribute:
      type: object
      description: A key-value pair used for custom attributes.
      properties:
        name:
          type: string
          description: Name of the attribute.
        value:
          type: string
          description: Value of the attribute.
    EntityMetadata:
      type: object
      description: Metadata common to Apigee entities.
      properties:
        createdAt:
          type: string
          format: int64
          description: Time the entity was created in milliseconds since epoch.
        lastModifiedAt:
          type: string
          format: int64
          description: Time the entity was last modified in milliseconds since epoch.
        subType:
          type: string
          description: Subtype of the entity.
    Properties:
      type: object
      description: A collection of key-value property pairs.
      properties:
        property:
          type: array
          description: List of properties.
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
    OperationGroup:
      type: object
      description: Groups operations for access control on an API product.
      properties:
        operationConfigs:
          type: array
          description: List of operation configurations.
          items:
            $ref: '#/components/schemas/OperationConfig'
        operationConfigType:
          type: string
          description: Type of operation configuration.
    OperationConfig:
      type: object
      description: Configuration for a set of operations on an API proxy.
      properties:
        apiSource:
          type: string
          description: Name of the API proxy this config applies to.
        operations:
          type: array
          description: List of operations.
          items:
            type: object
            properties:
              resource:
                type: string
                description: REST resource path.
              methods:
                type: array
                description: HTTP methods allowed.
                items:
                  type: string
        quota:
          type: object
          description: Quota settings for this operation config.
          properties:
            limit:
              type: string
            interval:
              type: string
            timeUnit:
              type: string
        attributes:
          type: array
          description: Custom attributes for this config.
          items:
            $ref: '#/components/schemas/Attribute'
    NodeConfig:
      type: object
      description: Runtime node configuration for an environment.
      properties:
        minNodeCount:
          type: string
          format: int64
          description: Minimum number of gateway nodes.
        maxNodeCount:
          type: string
          format: int64
          description: Maximum number of gateway nodes.
        currentAggregateNodeCount:
          type: string
          format: int64
          description: Output only. Current total number of gateway nodes.
          readOnly: true
    TlsInfo:
      type: object
      description: TLS configuration for a target server.
      properties:
        enabled:
          type: boolean
          description: Whether TLS is enabled.
        clientAuthEnabled:
          type: boolean
          description: Whether client authentication is required.
        keyStore:
          type: string
          description: Name of the keystore.
        keyAlias:
          type: string
          description: Name of the key alias.
        trustStore:
          type: string
          description: Name of the truststore.
        protocols:
          type: array
          description: Supported TLS protocols.
          items:
            type: string
        ciphers:
          type: array
          description: Supported cipher suites.
          items:
            type: string
        commonName:
          type: object
          description: Common name configuration.
          properties:
            value:
              type: string
            wildcardMatch:
              type: boolean
    PodStatus:
      type: object
      description: Status of a runtime pod.
      properties:
        podName:
          type: string
          description: Name of the pod.
        podStatus:
          type: string
          description: Current status of the pod.
        podStatusTime:
          type: string
          description: Time the status was last reported.
        deploymentStatus:
          type: string
          description: Deployment status within the pod.
        deploymentStatusTime:
          type: string
          description: Time the deployment status was reported.
        deploymentTime:
          type: string
          description: Time the deployment was last updated in the pod.
        appVersion:
          type: string
          description: Version of the app running in the pod.
        statusCode:
          type: string
          description: Status code.
        statusCodeDetails:
          type: string
          description: Human-readable details for the status code.
    Operation:
      type: object
      description: A long-running operation returned by asynchronous API calls.
      properties:
        name:
          type: string
          description: Name of the operation resource.
        metadata:
          type: object
          description: Service-specific metadata associated with the operation.
          additionalProperties: true
        done:
          type: boolean
          description: Whether the operation is complete.
        error:
          $ref: '#/components/schemas/Status'
        response:
          type: object
          description: The normal response of the operation.
          additionalProperties: true
    Status:
      type: object
      description: The Status type defines a logical error model.
      properties:
        code:
          type: integer
          format: int32
          description: The status code.
        message:
          type: string
          description: A developer-facing error message.
        details:
          type: array
          description: A list of messages that carry the error details.
          items:
            type: object
            additionalProperties: true
    Error:
      type: object
      description: Error response from the Apigee API.
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              format: int32
              description: HTTP error code.
            message:
              type: string
              description: Error message.
            status:
              type: string
              description: Error status string.
    ListOrganizationsResponse:
      type: object
      description: Response for listing organizations.
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
    ListApiProxiesResponse:
      type: object
      description: Response for listing API proxies.
      properties:
        proxies:
          type: array
          items:
            $ref: '#/components/schemas/ApiProxy'
    ListApiProductsResponse:
      type: object
      description: Response for listing API products.
      properties:
        apiProduct:
          type: array
          items:
            $ref: '#/components/schemas/ApiProduct'
    ListDevelopersResponse:
      type: object
      description: Response for listing developers.
      properties:
        developer:
          type: array
          items:
            $ref: '#/components/schemas/Developer'
    ListDeveloperAppsResponse:
      type: object
      description: Response for listing developer apps.
      properties:
        app:
          type: array
          items:
            $ref: '#/components/schemas/DeveloperApp'
    ListDeveloperAppKeysResponse:
      type: object
      description: Response for listing developer app keys.
      properties:
        developerAppKey:
          type: array
          items:
            $ref: '#/components/schemas/DeveloperAppKey'
    ListDeploymentsResponse:
      type: object
      description: Response for listing deployments.
      properties:
        deployments:
          type: array
          items:
            $ref: '#/components/schemas/Deployment'
    ListSharedFlowsResponse:
      type: object
      description: Response for listing shared flows.
      properties:
        sharedFlows:
          type: array
          items:
            $ref: '#/components/schemas/SharedFlow'
    ListAppGroupsResponse:
      type: object
      description: Response for listing app groups.
      properties:
        appGroups:
          type: array
          items:
            $ref: '#/components/schemas/AppGroup'
        nextPageToken:
          type: string
          description: Token for retrieving the next page.
        totalSize:
          type: integer
          format: int32
          description: Total number of app groups.
    ListInstancesResponse:
      type: object
      description: Response for listing instances.
      properties:
        instances:
          type: array
          items:
            $ref: '#/components/schemas/Instance'
        nextPageToken:
          type: string
          description: Token for retrieving the next page.
    ListDatastoresResponse:
      type: object
      description: Response for listing data stores.
      properties:
        datastores:
          type: array
          items:
            $ref: '#/components/schemas/Datastore'
  responses:
    BadRequest:
      description: >-
        Bad request. The request body or parameters are invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Unauthorized. Authentication credentials are missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >-
        Forbidden. The caller does not have permission to perform this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: >-
        Not found. The specified resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: >-
        Conflict. A resource with the same identifier already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
