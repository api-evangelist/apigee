specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Apigee
providerId: apigee
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - API Management
  - Gateways
  - Google Cloud
  - Monetization
  - Developer Portal
description: Apigee is sold as a Google Cloud product with a Pay-as-you-go option (hourly billing for
  environments and per-call charges) and three annual subscription editions — Standard, Enterprise, and
  Enterprise Plus — distinguished by environment count, included API call volume, support SLA, and advanced
  features (analytics, monetization, security). A free Evaluation org is offered for 60 days. List prices
  for subscriptions are negotiated via Google Cloud sales; PAYG rates are published per region.
sources:
  - https://cloud.google.com/apigee/pricing
plans:
  - id: apigee-evaluation
    name: Evaluation
    type: freemium
    description: 60-day free trial Apigee organization for developers and proofs-of-concept. Limited capacity
      and no SLA.
    entries:
      - label: Trial duration
        name: trial_duration
        type: quota
        metric: day
        limit: 60
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Single eval organization
      - name: Limited environments
      - name: Community support
      - name: No production SLA
  - id: apigee-payg
    name: Pay-as-you-go
    type: pay-as-you-go
    description: Hourly metered Apigee X consumption with no annual commitment. Bills per environment-hour
      and per API call, with regional pricing on Google Cloud.
    entries:
      - label: Environment-hour
        name: environment_hour
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://cloud.google.com/apigee/pricing
        userMultiplied: false
      - label: API calls
        name: api_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: see https://cloud.google.com/apigee/pricing
        userMultiplied: false
      - label: Networking egress
        name: egress
        type: metered
        metric: GB
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see Google Cloud networking pricing
        userMultiplied: false
    elements:
      - name: No annual commitment
      - name: Hourly billing
      - name: Standard support (Google Cloud support tier applies)
  - id: apigee-standard
    name: Standard (Subscription)
    type: subscription
    description: Annual Apigee subscription tier sized for production deployments with predictable traffic.
      Includes a fixed allotment of API calls and environments.
    entries:
      - label: Annual subscription
        name: annual_subscription
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Included API calls
        name: included_api_calls
        type: quota
        metric: request
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Annual commit pricing
      - name: Production SLA
      - name: API proxies, products, developer portal
      - name: Quota and SpikeArrest policies
      - name: Standard analytics
  - id: apigee-enterprise
    name: Enterprise (Subscription)
    type: subscription
    description: Higher-tier annual subscription with more environments, larger included call volume,
      advanced API security and analytics, and access to the Integrated Developer Portal.
    entries:
      - label: Annual subscription
        name: annual_subscription
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Included API calls
        name: included_api_calls
        type: quota
        metric: request
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Multi-environment
      - name: Advanced API analytics
      - name: API security reporting
      - name: Integrated developer portal
      - name: Production SLA
  - id: apigee-enterprise-plus
    name: Enterprise Plus (Subscription)
    type: subscription
    description: Top-tier annual subscription with the highest capacity (up to 85 environments, 6,000
      proxies/env), monetization, advanced security, and premium support.
    entries:
      - label: Annual subscription
        name: annual_subscription
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Included API calls
        name: included_api_calls
        type: quota
        metric: request
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Environments included
        name: environments
        type: quota
        metric: environment
        limit: 85
        timeFrame: year
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Up to 85 environments
      - name: Apigee Monetization
      - name: Advanced API security (Advanced API Security add-on)
      - name: Premium support
      - name: Multi-region failover
      - name: Custom data retention
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
