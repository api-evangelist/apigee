"""
Apigee GraphQL Schema
Conceptual schema derived from the Apigee REST API covering API proxy design and deployment,
developer portals, API products, app management, API analytics, quota management, and API security policies.
"""

scalar DateTime
scalar JSON
scalar Long

# ─────────────────────────────────────────────────────────────────────────────
# Root Operations
# ─────────────────────────────────────────────────────────────────────────────

type Query {
  # Organization
  organization(name: String!): Organization
  organizations: [Organization!]!

  # API Proxies
  apiProxy(organization: String!, name: String!): ApiProxy
  apiProxies(organization: String!): [ApiProxy!]!
  apiProxyRevision(organization: String!, name: String!, revision: String!): ApiProxyRevision

  # API Products
  apiProduct(organization: String!, name: String!): ApiProduct
  apiProducts(organization: String!, startKey: String, count: Int): ApiProductList!

  # Developers
  developer(organization: String!, email: String!): Developer
  developers(organization: String!, startKey: String, count: Int): DeveloperList!

  # Developer Apps
  developerApp(organization: String!, developerId: String!, appId: String!): DeveloperApp
  developerApps(organization: String!, developerId: String!): [DeveloperApp!]!

  # App Groups
  appGroup(organization: String!, name: String!): AppGroup
  appGroups(organization: String!): [AppGroup!]!
  appGroupApp(organization: String!, groupName: String!, appId: String!): AppGroupApp

  # Environments
  environment(organization: String!, name: String!): Environment
  environments(organization: String!): [Environment!]!

  # Deployments
  deployments(organization: String!, environment: String!): [Deployment!]!
  apiProxyDeployments(organization: String!, proxy: String!): [Deployment!]!

  # Shared Flows
  sharedFlow(organization: String!, name: String!): SharedFlow
  sharedFlows(organization: String!): [SharedFlow!]!

  # Key Value Maps
  keyValueMap(organization: String!, environment: String!, name: String!): KeyValueMap
  keyValueMaps(organization: String!, environment: String!): [KeyValueMap!]!

  # Target Servers
  targetServer(organization: String!, environment: String!, name: String!): TargetServer
  targetServers(organization: String!, environment: String!): [TargetServer!]!

  # Analytics
  analyticsStats(organization: String!, environment: String!, input: AnalyticsQueryInput!): AnalyticsStatsResponse!
  analyticsReport(organization: String!, reportName: String!): AnalyticsReport

  # Instances
  instance(organization: String!, name: String!): Instance
  instances(organization: String!): [Instance!]!

  # Certificates / Keystores
  keystore(organization: String!, environment: String!, name: String!): Keystore
  keystores(organization: String!, environment: String!): [Keystore!]!
  certificate(organization: String!, environment: String!, keystore: String!, alias: String!): Certificate

  # Security
  securityProfile(organization: String!, name: String!): SecurityProfile
  securityProfiles(organization: String!): [SecurityProfile!]!

  # API Hub
  apiHubApi(project: String!, location: String!, apiId: String!): ApiHubApi
  apiHubApis(project: String!, location: String!): [ApiHubApi!]!
  apiHubVersion(project: String!, location: String!, apiId: String!, versionId: String!): ApiHubVersion
  apiHubSpec(project: String!, location: String!, apiId: String!, versionId: String!, specId: String!): ApiHubSpec
  apiHubDeployment(project: String!, location: String!, deploymentId: String!): ApiHubDeployment
  apiHubDependency(project: String!, location: String!, dependencyId: String!): ApiHubDependency
  apiHubSearchResults(project: String!, location: String!, query: String!): [ApiHubSearchResult!]!

  # Integrations
  integration(project: String!, location: String!, name: String!): Integration
  integrations(project: String!, location: String!): [Integration!]!
  integrationExecution(project: String!, location: String!, integrationName: String!, executionId: String!): IntegrationExecution
  integrationExecutions(project: String!, location: String!, integrationName: String!): [IntegrationExecution!]!
  authConfig(project: String!, location: String!, name: String!): AuthConfig
  authConfigs(project: String!, location: String!): [AuthConfig!]!

  # Monetization
  ratePlan(organization: String!, apiProduct: String!, id: String!): RatePlan
  ratePlans(organization: String!, apiProduct: String!): [RatePlan!]!
  developerBalance(organization: String!, developerId: String!): DeveloperBalance
  developerMonetizationConfig(organization: String!, developerId: String!): DeveloperMonetizationConfig
}

type Mutation {
  # Organizations
  updateOrganization(name: String!, input: OrganizationInput!): Organization!

  # API Proxies
  createApiProxy(organization: String!, input: ApiProxyInput!): ApiProxy!
  deleteApiProxy(organization: String!, name: String!): DeleteResult!
  deployApiProxyRevision(organization: String!, name: String!, revision: String!, environment: String!): Deployment!
  undeployApiProxyRevision(organization: String!, name: String!, revision: String!, environment: String!): UndeployResult!

  # API Products
  createApiProduct(organization: String!, input: ApiProductInput!): ApiProduct!
  updateApiProduct(organization: String!, name: String!, input: ApiProductInput!): ApiProduct!
  deleteApiProduct(organization: String!, name: String!): DeleteResult!

  # Developers
  createDeveloper(organization: String!, input: DeveloperInput!): Developer!
  updateDeveloper(organization: String!, email: String!, input: DeveloperInput!): Developer!
  deleteDeveloper(organization: String!, email: String!): DeleteResult!

  # Developer Apps
  createDeveloperApp(organization: String!, developerId: String!, input: DeveloperAppInput!): DeveloperApp!
  updateDeveloperApp(organization: String!, developerId: String!, appId: String!, input: DeveloperAppInput!): DeveloperApp!
  deleteDeveloperApp(organization: String!, developerId: String!, appId: String!): DeleteResult!
  generateDeveloperAppKey(organization: String!, developerId: String!, appId: String!): AppCredential!
  revokeDeveloperAppKey(organization: String!, developerId: String!, appId: String!, consumerKey: String!): AppCredential!

  # App Groups
  createAppGroup(organization: String!, input: AppGroupInput!): AppGroup!
  updateAppGroup(organization: String!, name: String!, input: AppGroupInput!): AppGroup!
  deleteAppGroup(organization: String!, name: String!): DeleteResult!

  # Environments
  createEnvironment(organization: String!, input: EnvironmentInput!): Environment!
  updateEnvironment(organization: String!, name: String!, input: EnvironmentInput!): Environment!
  deleteEnvironment(organization: String!, name: String!): DeleteResult!

  # Shared Flows
  createSharedFlow(organization: String!, input: SharedFlowInput!): SharedFlow!
  deleteSharedFlow(organization: String!, name: String!): DeleteResult!

  # Key Value Maps
  createKeyValueMap(organization: String!, environment: String!, input: KeyValueMapInput!): KeyValueMap!
  deleteKeyValueMap(organization: String!, environment: String!, name: String!): DeleteResult!
  createKeyValueMapEntry(organization: String!, environment: String!, mapName: String!, input: KeyValueEntryInput!): KeyValueEntry!
  deleteKeyValueMapEntry(organization: String!, environment: String!, mapName: String!, entryName: String!): DeleteResult!

  # Target Servers
  createTargetServer(organization: String!, environment: String!, input: TargetServerInput!): TargetServer!
  updateTargetServer(organization: String!, environment: String!, name: String!, input: TargetServerInput!): TargetServer!
  deleteTargetServer(organization: String!, environment: String!, name: String!): DeleteResult!

  # Keystores
  createKeystore(organization: String!, environment: String!, input: KeystoreInput!): Keystore!
  deleteKeystore(organization: String!, environment: String!, name: String!): DeleteResult!
  createCertificate(organization: String!, environment: String!, keystore: String!, input: CertificateInput!): Certificate!
  deleteCertificate(organization: String!, environment: String!, keystore: String!, alias: String!): DeleteResult!

  # Security Profiles
  createSecurityProfile(organization: String!, input: SecurityProfileInput!): SecurityProfile!
  updateSecurityProfile(organization: String!, name: String!, input: SecurityProfileInput!): SecurityProfile!
  deleteSecurityProfile(organization: String!, name: String!): DeleteResult!
  attachSecurityProfile(organization: String!, name: String!, environment: String!): SecurityProfileEnvironment!
  detachSecurityProfile(organization: String!, name: String!, environment: String!): DeleteResult!

  # API Hub
  createApiHubApi(project: String!, location: String!, input: ApiHubApiInput!): ApiHubApi!
  updateApiHubApi(project: String!, location: String!, apiId: String!, input: ApiHubApiInput!): ApiHubApi!
  deleteApiHubApi(project: String!, location: String!, apiId: String!): DeleteResult!
  createApiHubVersion(project: String!, location: String!, apiId: String!, input: ApiHubVersionInput!): ApiHubVersion!
  createApiHubSpec(project: String!, location: String!, apiId: String!, versionId: String!, input: ApiHubSpecInput!): ApiHubSpec!
  createApiHubDeployment(project: String!, location: String!, input: ApiHubDeploymentInput!): ApiHubDeployment!
  createApiHubDependency(project: String!, location: String!, input: ApiHubDependencyInput!): ApiHubDependency!

  # Integrations
  createIntegration(project: String!, location: String!, input: IntegrationInput!): Integration!
  publishIntegration(project: String!, location: String!, name: String!, version: String!): Integration!
  executeIntegration(project: String!, location: String!, name: String!, input: IntegrationExecuteInput!): IntegrationExecuteResponse!
  createAuthConfig(project: String!, location: String!, input: AuthConfigInput!): AuthConfig!
  deleteAuthConfig(project: String!, location: String!, name: String!): DeleteResult!

  # Monetization
  createRatePlan(organization: String!, apiProduct: String!, input: RatePlanInput!): RatePlan!
  updateRatePlan(organization: String!, apiProduct: String!, id: String!, input: RatePlanInput!): RatePlan!
  deleteRatePlan(organization: String!, apiProduct: String!, id: String!): DeleteResult!
  updateDeveloperMonetizationConfig(organization: String!, developerId: String!, input: DeveloperMonetizationConfigInput!): DeveloperMonetizationConfig!
  topUpDeveloperBalance(organization: String!, developerId: String!, input: TopUpInput!): DeveloperBalance!
}

# ─────────────────────────────────────────────────────────────────────────────
# Organization Types
# ─────────────────────────────────────────────────────────────────────────────

type Organization {
  name: String!
  displayName: String
  description: String
  type: OrganizationType
  projectId: String
  runtimeType: RuntimeType
  subscriptionType: String
  analyticsRegion: String
  authorizedNetwork: String
  runtimeDatabaseEncryptionKeyName: String
  environments: [Environment!]
  properties: OrganizationProperties
  createdAt: DateTime
  lastModifiedAt: DateTime
  caCertificate: String
  state: ResourceState
}

type OrganizationProperties {
  property: [NameValuePair!]
}

input OrganizationInput {
  displayName: String
  description: String
  analyticsRegion: String
  authorizedNetwork: String
  runtimeDatabaseEncryptionKeyName: String
  properties: [NameValuePairInput!]
}

enum OrganizationType {
  TRIAL
  PAID
  INTERNAL
}

enum RuntimeType {
  CLOUD
  HYBRID
}

# ─────────────────────────────────────────────────────────────────────────────
# API Proxy Types
# ─────────────────────────────────────────────────────────────────────────────

type ApiProxy {
  name: String!
  displayName: String
  description: String
  revisions: [String!]
  latestRevisionId: String
  metaData: EntityMetaData
  labels: JSON
  apiProxyType: ApiProxyType
  readOnly: Boolean
}

type ApiProxyRevision {
  name: String!
  revision: String!
  displayName: String
  description: String
  basepaths: [String!]
  policies: [String!]
  proxies: [String!]
  resourceFiles: ResourceFileCollection
  targetServers: [String!]
  type: String
  configurationVersion: ConfigurationVersion
  contextInfo: String
  createdAt: DateTime
  lastModifiedAt: DateTime
  spec: String
  entityMetaDataAsProperties: JSON
  proxyEndpoints: [ProxyEndpoint!]
  targetEndpoints: [TargetEndpoint!]
}

type ProxyEndpoint {
  name: String!
  basePath: String
  preFlow: Flow
  postFlow: Flow
  flows: [Flow!]
  faultRules: [FaultRule!]
  httpProxyConnection: HttpProxyConnection
}

type TargetEndpoint {
  name: String!
  preFlow: Flow
  postFlow: Flow
  flows: [Flow!]
  faultRules: [FaultRule!]
  httpTargetConnection: HttpTargetConnection
}

type Flow {
  name: String
  condition: String
  request: FlowStep
  response: FlowStep
}

type FlowStep {
  steps: [Step!]
}

type Step {
  name: String!
  condition: String
}

type FaultRule {
  name: String!
  condition: String
  steps: [Step!]
}

type HttpProxyConnection {
  basePath: String!
  virtualHost: [String!]
}

type HttpTargetConnection {
  url: String
  loadBalancer: LoadBalancer
  sSLInfo: SSLInfo
}

type LoadBalancer {
  server: [TargetServerRef!]
  algorithm: LoadBalancerAlgorithm
  maxFailures: Int
  retryEnabled: Boolean
}

type TargetServerRef {
  name: String!
  weight: Int
  isEnabled: Boolean
}

type SSLInfo {
  enabled: Boolean
  clientAuthEnabled: Boolean
  keyStore: String
  keyAlias: String
  trustStore: String
  ignoreValidationErrors: Boolean
  protocols: [String!]
  ciphers: [String!]
}

type ConfigurationVersion {
  majorVersion: Int
  minorVersion: Int
}

type ResourceFileCollection {
  resourceFile: [ResourceFile!]
}

type ResourceFile {
  name: String!
  type: String!
}

input ApiProxyInput {
  name: String!
  displayName: String
  description: String
  apiProxyType: ApiProxyType
  labels: JSON
}

enum ApiProxyType {
  PROGRAMMABLE
  EXTENSIBLE
  GRAPHQL
}

enum LoadBalancerAlgorithm {
  ROUND_ROBIN
  LEAST_CONNECTION
  WEIGHTED
}

# ─────────────────────────────────────────────────────────────────────────────
# API Product Types
# ─────────────────────────────────────────────────────────────────────────────

type ApiProduct {
  name: String!
  displayName: String
  description: String
  approvalType: ApprovalType
  attributes: [Attribute!]
  environments: [String!]
  proxies: [String!]
  apiResources: [String!]
  operationGroup: OperationGroup
  quota: String
  quotaInterval: String
  quotaTimeUnit: QuotaTimeUnit
  quotaCounterScope: QuotaCounterScope
  scopes: [String!]
  createdAt: DateTime
  lastModifiedAt: DateTime
  state: ResourceState
}

type ApiProductList {
  apiProduct: [ApiProduct!]!
  nextPageToken: String
}

type OperationGroup {
  operationConfigs: [OperationConfig!]!
  operationConfigType: String
}

type OperationConfig {
  apiSource: String!
  operations: [ApiOperation!]!
  quota: Quota
  attributes: [Attribute!]
}

type ApiOperation {
  resource: String!
  methods: [String!]
}

type Quota {
  limit: String
  interval: String
  timeUnit: QuotaTimeUnit
}

input ApiProductInput {
  name: String!
  displayName: String
  description: String
  approvalType: ApprovalType
  attributes: [AttributeInput!]
  environments: [String!]
  proxies: [String!]
  apiResources: [String!]
  quota: String
  quotaInterval: String
  quotaTimeUnit: QuotaTimeUnit
  scopes: [String!]
}

enum ApprovalType {
  AUTO
  MANUAL
}

enum QuotaTimeUnit {
  MINUTE
  HOUR
  DAY
  MONTH
}

enum QuotaCounterScope {
  PROXY
  OPERATION
}

